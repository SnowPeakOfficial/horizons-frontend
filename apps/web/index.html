<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/horizons-logo.ico" />
    <link rel="icon" type="image/svg+xml" href="/images/horizons-logo.svg" />
    <link rel="apple-touch-icon" href="/images/horizons-logo.svg" />

    <!-- Primary Meta -->
    <title>Horizons - Memory Garden</title>
    <meta name="description" content="Plant memories that bloom forever. Horizons is a 3D memory garden where you plant digital flowers to preserve your most meaningful moments. Send blooming memories to loved ones — free to start." />
    <meta name="author" content="Horizons" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://horizons-garden.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://horizons-garden.com" />
    <meta property="og:site_name" content="Horizons - Memory Garden" />
    <meta property="og:title" content="Horizons - Memory Garden" />
    <meta property="og:description" content="Plant memories that bloom forever. Plant 3D digital flowers to preserve your most meaningful moments. Send blooming memories to loved ones — free to start." />
    <meta property="og:image" content="https://horizons-garden.com/images/horizons-logo.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Horizons — A 3D Memory Garden App" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Horizons - Memory Garden" />
    <meta name="twitter:description" content="Plant memories that bloom forever. Plant 3D digital flowers to preserve your most meaningful moments. Send blooming memories to loved ones." />
    <meta name="twitter:image" content="https://horizons-garden.com/images/horizons-logo.svg" />

    <!-- Structured Data: WebSite + SearchAction (enables Sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Horizons — Memory Garden",
      "url": "https://horizons-garden.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://horizons-garden.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Horizons — Memory Garden",
      "url": "https://horizons-garden.com",
      "logo": "https://horizons-garden.com/images/horizons-logo.svg",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, iOS, Android",
      "inLanguage": "en",
      "description": "A private 3D memory garden where you plant digital flowers to preserve your most meaningful moments, send timed messages to loved ones, and keep memories that actually last.",
      "featureList": [
        "Plant digital flowers to hold memories, photos, voice notes, and videos",
        "Set a future bloom date — seal memories to open on a date you choose",
        "Private gardens shared only with people you invite",
        "Send blooming flowers to loved ones",
        "No feeds, no algorithms, no public profiles"
      ],
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "CAD",
          "description": "Plant 1 flower per year in 1 private garden. No credit card required — start keeping memories today."
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "priceCurrency": "CAD",
          "description": "Plant up to 50 flowers per year across up to 3 gardens. More space for the moments that matter."
        },
        {
          "@type": "Offer",
          "name": "Premium",
          "priceCurrency": "CAD",
          "description": "Plant up to 100 flowers per year across up to 30 gardens. Room for every memory, every relationship, every chapter."
        }
      ]
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Horizons",
      "url": "https://horizons-garden.com",
      "logo": "https://horizons-garden.com/images/horizons-logo.svg",
      "description": "A private 3D digital memory garden platform for preserving meaningful moments as blooming flowers.",
      "areaServed": "Worldwide",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: FAQPage (mirrors landing page FAQ for rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Horizons?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Horizons is a 3D memory garden where you plant digital flowers to preserve your most meaningful moments. Each flower holds a message, a photo, a voice note, or a video — and can be set to bloom at a future date you choose."
          }
        },
        {
          "@type": "Question",
          "name": "What is a blooming flower?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A blooming flower is a memory you seal. You write your message now and set a specific date for it to open. Until then, the recipient sees a bud — a quiet signal that something is waiting. On the bloom date, it opens and delivers everything you put inside."
          }
        },
        {
          "@type": "Question",
          "name": "What can I put inside a flower?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A written message, a photo (upload or take one in-app), a voice note, or a short video. You can also choose a letter theme — romantic, friendly, family, or personal — that wraps your message in a beautiful design."
          }
        },
        {
          "@type": "Question",
          "name": "How does sharing work? Does the recipient need an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You invite people into your garden by email. They'll get a link and can join for free. For one-off blooming flowers, you can also send a private link directly — the recipient can open it without an account."
          }
        },
        {
          "@type": "Question",
          "name": "Who can see my garden and my memories?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Only the people you explicitly invite. Your garden is completely private by default — nothing is public, nothing is indexed by search engines, and no one can stumble in uninvited. You control every invitation."
          }
        },
        {
          "@type": "Question",
          "name": "Is Horizons free to start?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The free plan lets you create one garden and plant up to 10 flowers with basic media. No credit card required. Pro and Premium plans unlock multiple gardens, higher storage limits, voice notes, video, and priority support."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data encrypted and safe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your memories are encrypted in transit and at rest. We never sell your data, never use your memories to train AI models, and never share your content with third parties. What you plant stays yours."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my subscription at any time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — cancel anytime from your profile, no questions asked. You keep access until the end of your billing period. Your memories and gardens are never deleted when you cancel; they move to the free tier limits."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
